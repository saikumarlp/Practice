<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>classDom</title>
    <style>
        div {
            height: 100px;
            width: 300px;
            background-color:red;  
            margin-bottom: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>DOM Manupalation</h1>
    <button onclick="addBox()">Add box</button>
    <button onclick="removeBox()">Remove box</button>
    <br>

    <script>
        function addBox() {
            b = document.querySelector("body");
            newDiv = document.createElement("div");
            b.appendChild(newDiv);
        }

        function removeBox() {
            b = document.querySelector("body");
            itemDiv = document.querySelector("div");
            if(itemDiv)
            b.removeChild(itemDiv);
        }
    </script>
</body>
</html>
